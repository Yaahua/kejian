<p><font size="+3">王国维《古史新证·总论》提出了“二重证据法”：<br>
  </font></p>
<p><font size="+3" face="楷体_GB2312">　　<b>“吾辈生于今日，幸于纸上之材料外，更得地下之新材料。由此种新材料，我辈得据以补正纸上之材料，亦得证明古书之某部分全为实录，即百家不驯之言亦不无表示一面之事实。此二重证据法，惟在今日始得行之。</b></font></p>
<p><b><font size="+3" face="楷体_GB2312">　　虽古书之未得证明者，不能加以否定；而其已得证明者，不能不加以肯定，可以断言矣。” 
  </font> </b></p>
